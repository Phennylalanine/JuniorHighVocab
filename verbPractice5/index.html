<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verb Practice Part 5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="page-title">動詞練習 Part 5</h1>

<!-- Start Screen -->
<div id="startScreen" class="screen active">
  <button id="startBtn">Start Quiz</button>
</div>

<!-- Quiz Screen -->
<div id="quizScreen" class="screen hidden">
  
  <!-- LEFT SIDE: Words in progress -->
  <div id="sessionPanel" class="side-panel left">
    <h3>To Learn</h3>
    <div id="inProgressList"></div>
  </div>

  <!-- RIGHT SIDE: Mastered words -->
  <div id="masteredPanel" class="side-panel right">
    <h3>Mastered</h3>
    <div id="masteredList"></div>
  </div>
  
  <!-- Stats Panel -->
  <div id="statsPanel">
    <div class="level-section">
      <div>
        <strong>Level:</strong> <span id="level">1</span>
      </div>
      <div id="xpBarContainer">
        <div id="xpBar"></div>
      </div>
      <small id="xpText">0 / 10 XP</small>
    </div>
  </div>

  <div id="jpText"></div>
  <div id="enText"></div>

  <input
    type="text"
    id="answerInput"
    autocomplete="off"
    placeholder="Type the English"
  />

  <div id="feedback"></div>

  <!-- Button Container for Swapping -->
  <div class="button-container">
    <button id="nextBtn" class="hidden">Next</button>
    <button id="tryAgainBtn" class="hidden">Try Again</button>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>

<footer>
  © 2024–2026 Created by Peter Gregory
</footer>

<script src="script.js"></script>
</body>
</html>
